version: 1

# Model ids below are PLACEHOLDER deployment names. Override them to match
# your provider catalog. For Azure OpenAI, these should be the deployment
# names you configure in the portal (see
# https://learn.microsoft.com/azure/ai-services/openai/how-to/create-resource).
# For Anthropic, use the public model id from
# https://docs.anthropic.com/en/docs/about-claude/models .
#
# Environment overrides (consumed by adapters):
#   AZURE_OPENAI_REASONING_DEPLOYMENT  -> replaces `azure-reasoning`
#   AZURE_OPENAI_CODEGEN_DEPLOYMENT    -> replaces `azure-codegen`
#   ANTHROPIC_PRIMARY_MODEL            -> replaces `anthropic-primary`
#   ANTHROPIC_FALLBACK_MODEL           -> replaces `anthropic-fallback`

# Pricing in USD per 1M tokens. Update to match your negotiated rates.
pricing:
  anthropic-primary:
    input_per_mtok: 15.00
    output_per_mtok: 75.00
  anthropic-fallback:
    input_per_mtok: 3.00
    output_per_mtok: 15.00
  azure-reasoning:
    input_per_mtok: 2.50
    output_per_mtok: 10.00
  azure-codegen:
    input_per_mtok: 1.25
    output_per_mtok: 5.00

# Defaults used by strategies if no override is supplied.
model_defaults:
  single_agent_primary: anthropic-primary
  single_agent_fallback: anthropic-fallback
  pciv_planner: azure-reasoning
  pciv_implementer: azure-codegen
  fleet_worker: anthropic-fallback

# Path to the pciv project's config file. Resolved relative to this policy
# file unless absolute. Used by the PCIV strategy.
pciv:
  config_path: ../../PCIV/plan.yaml

fleet:
  max_workers: 4
  per_shard_max_tokens: 2048
  sqlite_path: .budgeteer/fleet.db

# Output-token projection coefficients per strategy. Tune these to match
# measured behaviour of your models before BudgetGovernor projects costs.
projection:
  single_base: 1500
  single_per_planning_step: 200
  pciv_multiplier: 3
  pciv_per_planning_step: 300
  fleet_per_shard: 1500
  fleet_max_shards: 16

# Classifier wordlists. Override to tune the heuristic without code changes.
# Empty or missing lists fall back to the defaults baked into classifier.py.
classifier:
  reasoning_tokens: []
  mechanical_tokens: []
  imperative_verbs: []

# Decision tree thresholds for policy v0.
routing:
  large_context_token_threshold: 600000
  tight_budget_usd: 0.50
  short_latency_seconds: 120
  fleet_min_file_count: 8
  fleet_max_coupling: 0.30
  pciv_min_reasoning_ratio: 0.60
  pciv_min_planning_depth: 5

# Cross-run rolling-window cap (ADR 0005). Mounts a SQLite-backed
# `agentcore.budget.PersistentBudgetLedger` so two `budgeteer run`
# invocations from the same workspace share the cap. Comment out
# `cap_usd` (or set to null) to disable cross-run enforcement; the
# per-run `--budget` still applies. `window` is `monthly` (YYYY-MM, UTC)
# or `daily` (YYYY-MM-DD, UTC). `db_path` is resolved relative to this
# policy file unless absolute; defaults to `.budgeteer/cross_run.db`.
cross_run:
  cap_usd: 60.00
  window: monthly
  db_path: ../../PCIV/.pciv/ledger.db

# Degradation: if projected_cost > ratio * budget_remaining, swap
# non-planning step models from the "from" list to "to".
degradation:
  trigger_ratio: 0.70
  swap:
    - from: anthropic-primary
      to: anthropic-fallback
      protect_roles: ["planner", "critic"]
